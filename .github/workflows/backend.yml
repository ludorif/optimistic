name: Build and Publish Backend Docker Image

on:
  push:
    tags:
      - be-v*

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: Backend
        run: poetry install
        
      - name: Mypy
        working-directory: Backend
        run: poetry run mypy --install-types --non-interactive --incremental --show-error-codes --pretty backend

      - name: Run tests
        working-directory: Backend
        run: poetry run pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#be-}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Backend/Dockerfile
          push: true
          no-cache: true
          tags: ludorif/optimistic-backend:${{ steps.version.outputs.tag }}
          platforms: linux/amd64