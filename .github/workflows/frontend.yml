name: Build and Publish Frontend Docker Image

on:
  push:
    tags:
      - fe-v*

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci   # <-- installs all dependencies including devDependencies
        
      - name: Type check
        working-directory: Frontend
        run: npm run typecheck   # tsc --noEmit

      - name: Lint
        working-directory: Frontend
        run: npm run lint        # eslint .
      
      - name: Run tests
        working-directory: Frontend
        run: npm run test        # jest or vitest

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#fe-}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          no-cache: true
          tags: ludorif/optimistic-frontend:${{ steps.version.outputs.tag }}
          build-args: VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          platforms: linux/amd64